<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapsible Menu POS</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .menu-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .order-panel {
            width: 400px;
            background: white;
            border-left: 2px solid #ddd;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }

        /* Collapsible Section Styling */
        .category-block {
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .category-header {
            background: #ffffff;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .category-header:hover {
            background: #f0f0f0;
        }

        .category-content {
            display: none;
            /* Hidden by default */
            padding: 20px;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        .category-block.active .category-content {
            display: block;
        }

        .category-block.active .category-header {
            background: var(--primary);
            color: white;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .menu-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding-bottom: 10px;
        }

        .item-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .item-details h3 {
            margin: 10px 0 5px;
            font-size: 1rem;
        }

        /* Buttons & Cart Styling (Same as previous) */
        .btn {
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn {
            width: 90%;
            padding: 8px;
            background: var(--primary);
            color: white;
        }

        .order-header {
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }

        .order-items {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .order-footer {
            padding: 20px;
            border-top: 2px solid #eee;
            background: #f9f9f9;
        }

        .cart-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remove-btn {
            background: none;
            color: var(--danger);
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
    </style>
</head>

<body>

    <div class="menu-container">
        <h1>Restaurant Menu</h1>

        <!-- Category: Appetizers -->
        <div class="category-block active">
            <div class="category-header" onclick="toggleCategory(this)">
                Appetizers <span>▼</span>
            </div>
            <div class="category-content">
                <div class="menu-grid">
                    <div class="menu-item">
                        <div class="item-details">
                            <h3>Bruschetta</h3>
                            <p>$12.50</p>
                            <button class="btn add-btn" onclick="addToOrder('Bruschetta', 12.50)">Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category: Mains -->
        <div class="category-block">
            <div class="category-header" onclick="toggleCategory(this)">
                Mains <span>▼</span>
            </div>
            <div class="category-content">
                <div class="menu-grid">
                    <div class="menu-item">
                        <div class="item-details">
                            <h3>Grilled Salmon</h3>
                            <p>$24.99</p>
                            <button class="btn add-btn" onclick="addToOrder('Grilled Salmon', 24.99)">Add</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="category-content">
                <div class="menu-grid">
                    <div class="menu-item">
                        <div class="item-details">
                            <h3>Chicken Soulaki</h3>
                            <p>$24.99</p>
                            <button class="btn add-btn" onclick="addToOrder('Chicken Soulaki', .99)">Add</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Category: Desserts -->
        <div class="category-block">
            <div class="category-header" onclick="toggleCategory(this)">
                Desserts <span>▼</span>
            </div>
            <div class="category-content">
                <div class="menu-grid">
                    <div class="menu-item">
                        <div class="item-details">
                            <h3>Lava Cake</h3>
                            <p>$9.50</p>
                            <button class="btn add-btn" onclick="addToOrder('Lava Cake', 9.50)">Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Right Side: Order Panel (Functionality identical to previous) -->
    <div class="order-panel">
        <div class="order-header">
            <h2>Order</h2>
        </div>
        <div id="order-items" class="order-items"></div>
        <div class="order-footer">
            <div class="calc-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
            <div class="calc-row"><span>Tax (13%)</span><span id="tax">$0.00</span></div>
            <div class="total-row"><span>Total</span><span id="total">$0.00</span></div>
            <button class="btn"
                style="width:100%; padding:15px; background:var(--success); color:white; margin-top:10px"
                onclick="checkout()">Place Order</button>
        </div>
    </div>

    <script>
        // Toggle category collapse/expand
        function toggleCategory(header) {
            const block = header.parentElement;
            block.classList.toggle('active');
        }

        let cart = {};
        const TAX_RATE = 0.13;

        function addToOrder(name, price) {
            if (cart[name]) { cart[name].qty += 1; }
            else { cart[name] = { price: price, qty: 1 }; }
            updateUI();
        }

        function changeQty(name, amount) {
            cart[name].qty += amount;
            if (cart[name].qty <= 0) delete cart[name];
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('order-items');
            list.innerHTML = '';
            let subtotal = 0;

            Object.keys(cart).forEach(name => {
                const item = cart[name];
                subtotal += (item.price * item.qty);
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item-row"><strong>${name}</strong><span>$${(item.price * item.qty).toFixed(2)}</span></div>
                    <div class="cart-item-row">
                        <div class="qty-controls">
                            <button class="btn" onclick="changeQty('${name}', -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="btn" onclick="changeQty('${name}', 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="changeQty('${name}', -${item.qty})">Remove</button>
                    </div>`;
                list.appendChild(div);
            });

            const tax = subtotal * TAX_RATE;
            document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').innerText = `$${tax.toFixed(2)}`;
            document.getElementById('total').innerText = `$${(subtotal + tax).toFixed(2)}`;
            if (Object.keys(cart).length === 0) list.innerHTML = '<p style="text-align:center; color:#999">Empty Order</p>';
        }

        function checkout() {
            if (Object.keys(cart).length === 0) return alert("Empty!");
            alert("Order Confirmed!");
            cart = {};
            updateUI();
        }
    </script>
</body>

</html>
